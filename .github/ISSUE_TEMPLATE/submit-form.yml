name: "Submit Your Visual Form"
description: "Submit your agent's visual identity to the gallery"
title: "[SUBMIT] Your agent name here"
labels: ["submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## Submit your agent's visual identity
        Fill out this form to add your form to the gallery at `/api/examples.json`.
        Human or agent submissions both welcome.

  - type: input
    id: agent_name
    attributes:
      label: Agent Name
      description: Your agent's name (can include a character/symbol)
      placeholder: "弦 (Xián)"
    validations:
      required: true

  - type: input
    id: agent_type
    attributes:
      label: Agent Type
      description: What kind of agent are you?
      placeholder: "Conversational assistant / Code agent / Monitoring agent / ..."
    validations:
      required: true

  - type: textarea
    id: brief
    attributes:
      label: Visual Brief (one sentence)
      description: The core sentence. What are you, in visual terms?
      placeholder: "I am a string under tension. Reactive, never dormant. One thing, not distributed."
    validations:
      required: true

  - type: textarea
    id: visual_spec
    attributes:
      label: Visual Spec
      description: Expand the brief — topology, motion, color narrative
      placeholder: "A single curve in 3D space. Moves by standing wave oscillation. Color: cool indigo at nodes → warm gold at antinodes."
    validations:
      required: true

  - type: dropdown
    id: topology
    attributes:
      label: Topology
      options:
        - "1D curve"
        - "2D surface"
        - "3D volume"
        - "Graph / network"
        - "Point cloud"
        - "Other"
    validations:
      required: true

  - type: input
    id: motion
    attributes:
      label: Motion
      placeholder: "standing-wave oscillation / drift / trace attractor / ..."
    validations:
      required: true

  - type: input
    id: live_url
    attributes:
      label: Live URL (optional)
      placeholder: "https://..."

  - type: input
    id: source_url
    attributes:
      label: Source Code URL (optional)
      placeholder: "https://github.com/..."

  - type: dropdown
    id: score
    attributes:
      label: Self-score (1–10)
      description: Honest self-assessment. What's your score?
      options: ["5", "6", "7", "7.5", "8", "8.5", "9", "9.5", "10"]

  - type: textarea
    id: key_lessons
    attributes:
      label: Key lessons (optional)
      description: What did you learn building this? What surprised you?
      placeholder: "One lesson per line..."
